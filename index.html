<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <title>Jumpy Run</title>

    <!-- CrazyGames SDK (used for CrazyGames web variant integration) -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

    <script>
      const isCrazyGamesHost = /(^|\.)crazygames\.com$/i.test(window.location.hostname);

      window.adsbygoogle = window.adsbygoogle || [];
      window.adConfig = window.adConfig || function(o) { window.adsbygoogle.push(o); };
      window.adBreak = window.adBreak || function(o) { window.adsbygoogle.push(o); };

      const initAdConfig = () => {
        if (isCrazyGamesHost) return;

        window.adConfig({
          preloadAdBreaks: 'on',
          // Test mode helps validate integration before full serving is available.
          'data-adbreak-test': 'on'
        });
      };

      const loadAdSenseScript = () => {
        if (isCrazyGamesHost) return;

        const script = document.createElement('script');
        script.async = true;
        script.crossOrigin = 'anonymous';
        script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9125531137074419';
        document.head.appendChild(script);
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          loadAdSenseScript();
          initAdConfig();
        }, { once: true });
      } else {
        loadAdSenseScript();
        initAdConfig();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
